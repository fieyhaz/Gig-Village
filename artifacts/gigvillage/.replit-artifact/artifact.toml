kind = "web"
previewPath = "/"
title = "GigVillage Platform"
version = "1.0.0"
id = "artifacts/gigvillage"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18787

[services.development]
run = "pnpm --filter @workspace/gigvillage run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gigvillage", "run", "build" ]
publicDir = "artifacts/gigvillage/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18787"
BASE_PATH = "/"
